        <form action="first_website.PHP" method="post" target="_blank">
            <div>
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname" placeholder="FName" required >
            </div>

            <br>

            <div>
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lname" placeholder="LName" required >
            </div>

            <br>

            <div>
                <label for="pass">Password</label>
                <input type="password" id="pass" name="password" maxlength="8" required>
            </div>

            <br>

            <div>
                <label for="mail">Email</label>
                <input type="email" id="email" name="email" placeholder="nguyenthangdat84@gmail" required>
            </div>

            <br>

            <div>
                <label for="tel">Telephone</label>
                <input type="tel" id="tel" name="tel" maxlength="10" placeholder="0123456789" required>
            </div>

            <br>

            <div>
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <br>

            <div>
                <label for="quan">Quantity</label>
                <input type="number" id="quan" name="quan" min="0" max="100" value="0" required>
            </div>

            <br>

            <div>
                <label for="title">Title:</label>
                <label for="mr">Mr.</label>
                <input type="radio" id="mr" name="title" value="mr">
                <label for="ms">Ms.</label>
                <input type="radio" id="ms" name="title" value="ms">
            </div>

            <br>

            <div>
                <label for="payment">Payment</label>
                <select id="payment" name="payment">
                    <option value="visa">Visa</option>
                    <option value="money">Money</option>
                    <option value="ATM card">ATM Card</option>
                </select>
            </div>

            <br>

            <div>
                <label for="done">Done</label>
                <input type="checkbox" id="done" name="done">
            </div>

            <br>


            <div>
                <input type="reset" name="reset">
                <input type="submit" name="submit">
            </div>
        </form>
